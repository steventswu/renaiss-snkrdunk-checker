<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNKRDUNK Price Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>SNKRDUNK</h1>
        <button id="closeModal" class="close-icon">&times;</button>
      </div>
      <div class="status-badge" id="cardName">Detecting card...</div>
    </header>

    <main>
      <div class="price-grid">
        <div class="price-card" id="psa10-card">
          <div class="label">PSA 10</div>
          <div class="price" id="psa10-price">--</div>
          <div class="trend" id="psa10-status">Searching...</div>
        </div>
        <div class="price-card full-width" id="avg-price-card">
          <div class="label">30-Day Avg (PSA 10)</div>
          <div class="market-stats-row">
            <div class="stat-item highlight">
              <span class="s-val" id="avg-val">--</span>
            </div>
            <div class="sub-stats">
              <div class="stat-item">
                <span class="s-label">High</span>
                <span class="s-val" id="high-val">--</span>
              </div>
              <div class="stat-item">
                <span class="s-label">Low</span>
                <span class="s-val" id="low-val">--</span>
              </div>
            </div>
          </div>
          <div id="avg-price" style="display: none;">--</div>
        </div>
        <div class="price-card" id="psa10-pop-card">
          <div class="label">PSA 10 POP</div>
          <div class="price" id="psa10-pop">--</div>
        </div>
        <div class="price-card" id="total-pop-card">
          <div class="label">TOTAL GRADED</div>
          <div class="price" id="total-graded-pop">--</div>
        </div>
        <div class="price-card full-width" id="total-sold-card">
          <div class="label">Units Sold (30D)</div>
          <div class="price" id="total-units-sold">--</div>
        </div>
      </div>

      <div class="pc-section" id="pc-section">
        <div class="section-header">
          <div class="label">PriceCharting Market Prices</div>
          <div class="pc-status" id="pc-status">Searching...</div>
        </div>
        <div class="pc-price-grid">
          <div class="pc-price-item">
            <span class="pc-label">Ungraded</span>
            <span class="pc-val" id="pc-ungraded">--</span>
          </div>
          <div class="pc-price-item">
            <span class="pc-label">PSA 9</span>
            <span class="pc-val" id="pc-psa9">--</span>
          </div>
          <div class="pc-price-item highlight">
            <span class="pc-label">PSA 10</span>
            <span class="pc-val" id="pc-psa10">--</span>
          </div>
        </div>
        <a id="pc-link" class="pc-link" href="#" target="_blank" style="display:none;">View on PriceCharting →</a>
      </div>

      <div class="advanced-market-card">
        <div class="chart-container">
          <div id="chart-area" class="chart-area"></div>
          <div id="months-row" class="months-row"></div>
        </div>
      </div>

      <div class="history-section">
        <div class="section-header">
          <div class="label">Last 5 Trades</div>
        </div>
        <div id="trade-history-list" class="history-list">
          <div class="history-item loading">Loading history...</div>
        </div>
      </div>

    </main>

    <footer>
      <button id="viewOnSnkrdunk" class="primary-btn">View on SNKRDUNK</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
